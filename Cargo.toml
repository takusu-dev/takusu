[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/satler-git/takusu"

[workspace.dependencies]
thiserror = "2.0"
jiff = "0.2.21"
rand = "0.8"
rustc-hash = "2.1"
rayon = "1.10"
criterion = "0.5"

tokio = { version = "1.52.0", features = ["full"] }
