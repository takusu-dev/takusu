[package]
name = "takusu-audio"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["whisper", "funasr"]
whisper = ["whisper-rs", "hf-hub"]
funasr = ["tokio-tungstenite", "futures-util"]

[dependencies]
thiserror = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { version = "0.13", features = ["json", "rustls", "query"], default-features = false }
rmp-serde = "1.3"
base64 = "0.22"

cpal = "0.17.3"

whisper-rs = { version = "0.16.0", features = ["openblas"], optional = true }
hf-hub = { version = "0.5.0", features = ["rustls-tls", "tokio"], default-features = false, optional = true }

tokio-tungstenite = { version = "0.26", optional = true }
futures-util = { version = "0.3", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }