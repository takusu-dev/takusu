name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      apply_migrations:
        description: Apply D1 migrations before deploy
        type: boolean
        default: true

# Required secrets:
#   CLOUDFLARE_API_TOKEN  - Cloudflare API token (needs Workers & D1 write)
#   CLOUDFLARE_ACCOUNT_ID - Cloudflare account ID
#   D1_DATABASE_ID        - D1 database UUID (overrides placeholder in wrangler.toml)

env:
  WORKER_DIR: crates/takusu-worker

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f

      - name: Restore binary cache
        uses: asa1984/infra/.github/actions/binary-cache@44165003348ea3578a66f8c879bfaf23a3c7cc18
        with:
          package: .#ci-worker

      - run: nix profile install .#ci-worker

      - uses: Swatinem/rust-cache@v2

      - name: Build worker
        run: |
          nix develop .#worker --command bash -c "cd $WORKER_DIR && worker-build --release"

      # Migrations run before deploy so the database schema is ready for new code.
      # On tag push they auto-apply; on manual trigger they respect the input flag.
      # If you need to apply migrations without deploying (e.g. a backward-compatible
      # schema change), use workflow_dispatch with apply_migrations=true.
      # For destructive migrations (drop/rename columns), consider applying manually
      # in two phases: deploy backward-compatible code first, then migrate.
      - name: Apply D1 migrations
        if: github.event_name != 'workflow_dispatch' || inputs.apply_migrations
        run: |
          nix develop .#worker --command bash -c "cd $WORKER_DIR && wrangler d1 migrations apply takusu --remote"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: |
          nix develop .#worker --command bash -c "cd $WORKER_DIR && wrangler deploy"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f

      # Cache the takusu-cli closure directly — `nix bundle` builds it, so no
      # separate `nix profile install` is needed.
      - name: Restore binary cache
        uses: asa1984/infra/.github/actions/binary-cache@44165003348ea3578a66f8c879bfaf23a3c7cc18
        with:
          package: .#takusu-cli

      - uses: Swatinem/rust-cache@v2

      # The plain crane build links against /nix/store paths, so the bare
      # binary won't run off this machine. Bundle the full closure into a
      # self-contained AppImage so the release artifact is portable.
      - name: Build takusu-cli AppImage
        run: |
          nix bundle --bundler github:ralismark/nix-appimage \
            .#takusu-cli -o takusu-cli-x86_64-linux.AppImage

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: takusu-cli
          path: takusu-cli-x86_64-linux.AppImage

  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: easimon/maximize-build-space@fc881a613ad2a34aca9c9624518214ebc21dfc0c # master 2025/3/10
        with:
          # The Expo/Gradle/React-Native build runs in the workspace on the
          # root filesystem, so it needs plenty of free space there. On these
          # runners /mnt lives on the same /dev/root filesystem, so the action
          # creates both LVM PVs on root: the final free space left on / ends
          # up being temp-reserve-mb (the second PV eats into root-reserve-mb).
          # So temp-reserve-mb governs / free space and must stay < root-reserve-mb
          # (otherwise the second PV is zero-sized and fallocate fails). This
          # leaves ~30G free on / for the build; /nix gets the rest (~58G).
          root-reserve-mb: 35840
          swap-size-mb: 1024
          temp-reserve-mb: 30720
          # Mount the maximized volume at /nix (not just /nix/store) so the Nix
          # build directory can live on the big mount too (see build-dir below).
          build-mount-path: "/nix"
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          # By default Nix builds in the daemon's TMPDIR on the small root
          # partition, so unpacking the Android NDK (~several GB) overflows
          # root-reserve-mb and fails with "write error (disk full?)". Point
          # build-dir at the large /nix mount instead.
          extra_nix_config: |
            build-dir = /nix/tmp

      - name: Create Nix build directory on the large mount
        run: sudo install -d -m 1777 /nix/tmp

      # `nix run` builds directly to /nix/store (on the big mount), so no
      # binary cache or profile install is needed here.
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Expo dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Build APK (Nix-managed .so + uniffi-bindgen + Gradle)
        run: |
          nix run .#build-android-apk
        env:
          EXPO_PUBLIC_WORKERS_URL: ${{ secrets.EXPO_PUBLIC_WORKERS_URL }}
          EXPO_PUBLIC_ROOT_TOKEN: ${{ secrets.EXPO_PUBLIC_ROOT_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: takusu-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk

  prerelease:
    runs-on: ubuntu-latest
    needs:
      - build-cli
      - build-android-apk
    # Only publish a release for tag pushes; manual runs build/verify
    # artifacts without cutting a GitHub release.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create prerelease with CLI and APK
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/takusu-cli-x86_64-linux.AppImage
            dist/app-release.apk
          name: takusu ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
