name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_worker:
        description: Deploy worker to Cloudflare after build
        type: boolean
        default: true
      apply_migrations:
        description: Apply D1 migrations before deploy (only if deploy_worker)
        type: boolean
        default: true

# Required secrets:
#   CLOUDFLARE_API_TOKEN  - Cloudflare API token (needs Workers & D1 write)
#   CLOUDFLARE_ACCOUNT_ID - Cloudflare account ID
#   D1_DATABASE_ID        - D1 database UUID (overrides placeholder in wrangler.toml)
#   TAKUSU_KEYSTORE_BASE64 - base64-encoded release keystore file
#   TAKUSU_STORE_PASSWORD  - keystore store password
#   TAKUSU_KEY_PASSWORD    - keystore key password
#   TAKUSU_KEY_ALIAS       - keystore key alias (e.g. "takusu")
#   SENTRY_DSN            - Rust Sentry DSN (used by takusu-cli / takusu-local at runtime)
#   EXPO_PUBLIC_SENTRY_DSN - Mobile Sentry DSN (embedded into the Expo bundle)
#   SENTRY_AUTH_TOKEN      - Sentry auth token for uploading mobile source maps
#   SENTRY_URL             - Sentry URL (optional, defaults to https://sentry.io/)
#   SENTRY_ORG             - Sentry organization slug (optional, defaults to satler-git)
#   SENTRY_PROJECT         - Sentry project slug (optional, defaults to takusu)

env:
  WORKER_DIR: crates/takusu-worker

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f

      - name: Restore binary cache
        uses: asa1984/infra/.github/actions/binary-cache@44165003348ea3578a66f8c879bfaf23a3c7cc18
        with:
          package: .#ci-worker

      - run: nix profile install .#ci-worker

      - uses: Swatinem/rust-cache@v2

      - name: Build worker
        run: |
          nix develop .#worker --command bash -c "cd $WORKER_DIR && worker-build --release"

      # Deploy is gated on the deploy_worker input (default true).
      # On tag push it always deploys; on manual trigger it can be skipped
      # to verify the build without touching production.
      # Migrations run before deploy so the database schema is ready for new
      # code. They only run when deploying, and respect the apply_migrations
      # flag on manual triggers. For destructive migrations, consider applying
      # manually in two phases: deploy backward-compatible code first, then
      # migrate.
      - name: Apply D1 migrations
        if: github.event_name == 'push' || (inputs.deploy_worker && inputs.apply_migrations)
        run: |
          nix develop .#worker --command bash -c "cd $WORKER_DIR && wrangler d1 migrations apply takusu --remote"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' || inputs.deploy_worker
        run: |
          nix develop .#worker --command bash -c "cd $WORKER_DIR && wrangler deploy"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  build-cli:
    runs-on: ubuntu-latest
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f

      # Cache the takusu-cli closure directly — `nix bundle` builds it, so no
      # separate `nix profile install` is needed.
      - name: Restore binary cache
        uses: asa1984/infra/.github/actions/binary-cache@44165003348ea3578a66f8c879bfaf23a3c7cc18
        with:
          package: .#takusu-cli

      - uses: Swatinem/rust-cache@v2

      # The plain crane build links against /nix/store paths, so the bare
      # binary won't run off this machine. Bundle the full closure into a
      # self-contained AppImage so the release artifact is portable.
      - name: Build takusu-cli AppImage
        run: |
          nix bundle --bundler github:ralismark/nix-appimage \
            .#takusu-cli -o takusu-cli-x86_64-linux.AppImage

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: takusu-cli
          path: takusu-cli-x86_64-linux.AppImage

  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          # easimon/maximize-build-space is flaky on current GitHub-hosted
          # runners because the LVM setup can receive an invalid size and fail
          # with "fallocate: invalid length value specified". free-disk-space
          # only removes pre-installed software, which is enough now that
          # runners provide a single large root filesystem.
          tool-cache: true

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          # Keep Nix build temporary files under /nix/tmp so they are colocated
          # with the Nix store instead of the daemon's default TMPDIR.
          extra_nix_config: |
            build-dir = /nix/tmp

      - name: Create Nix build directory
        run: sudo install -d -m 1777 /nix/tmp

      # The binary-cache action hardcodes /tmp/binary-cache as its cache
      # directory. Symlink it to /nix/tmp so the multi-GB .so closure stays on
      # the same filesystem as the Nix store.
      - name: Symlink binary cache to /nix/tmp
        run: |
          mkdir -p /nix/tmp/binary-cache
          ln -sfn /nix/tmp/binary-cache /tmp/binary-cache

      - name: Restore binary cache
        uses: asa1984/infra/.github/actions/binary-cache@44165003348ea3578a66f8c879bfaf23a3c7cc18
        with:
          package: .#ci-android-libs

      - uses: Swatinem/rust-cache@v2

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile/package.json', 'mobile/package-lock.json') }}
          restore-keys: gradle-

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Expo dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Decode release keystore
        env:
          TAKUSU_KEYSTORE_BASE64: ${{ secrets.TAKUSU_KEYSTORE_BASE64 }}
        run: |
          echo "$TAKUSU_KEYSTORE_BASE64" | base64 -d > mobile/android-release.keystore
          echo "Keystore decoded: $(stat -c%s mobile/android-release.keystore) bytes"

      - name: Determine APK version
        id: version
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
            echo "version=v${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK (Nix-managed .so + uniffi-bindgen + Gradle)
        run: |
          nix run .#build-android-apk
        env:
          EXPO_PUBLIC_WORKERS_URL: ${{ secrets.EXPO_PUBLIC_WORKERS_URL }}
          EXPO_PUBLIC_ROOT_TOKEN: ${{ secrets.EXPO_PUBLIC_ROOT_TOKEN }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TAKUSU_KEYSTORE_PATH: ${{ github.workspace }}/mobile/android-release.keystore
          TAKUSU_STORE_PASSWORD: ${{ secrets.TAKUSU_STORE_PASSWORD }}
          TAKUSU_KEY_PASSWORD: ${{ secrets.TAKUSU_KEY_PASSWORD }}
          TAKUSU_KEY_ALIAS: ${{ secrets.TAKUSU_KEY_ALIAS }}

      # Rename the APK to include the version so Obtainium can identify and
      # filter it (e.g. takusu-v0.1.0.apk).
      - name: Rename APK for Obtainium
        run: |
          cp mobile/android/app/build/outputs/apk/release/app-release.apk \
             takusu-${{ steps.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: takusu-apk
          path: takusu-${{ steps.version.outputs.version }}.apk

  prerelease:
    runs-on: ubuntu-latest
    needs:
      - build-cli
      - build-android-apk
    # Only publish a release for tag pushes; manual runs build/verify
    # artifacts without cutting a GitHub release.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create prerelease with CLI and APK
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/takusu-cli-x86_64-linux.AppImage
            dist/takusu-${{ github.ref_name }}.apk
          name: takusu ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
