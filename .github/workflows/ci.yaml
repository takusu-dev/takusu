name: CI

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f

      - name: Restore binary cache
        uses: asa1984/infra/.github/actions/binary-cache@44165003348ea3578a66f8c879bfaf23a3c7cc18
        with:
          package: .#ci-rust

      - run: nix profile install .#ci-rust

      - uses: Swatinem/rust-cache@v2

      - run: nix develop .#rust --command bash -c "cargo clippy --all-targets --all-features -- -D warnings"
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f

      - name: Restore binary cache
        uses: asa1984/infra/.github/actions/binary-cache@44165003348ea3578a66f8c879bfaf23a3c7cc18
        with:
          package: .#ci-rust

      - run: nix profile install .#ci-rust

      - uses: Swatinem/rust-cache@v2

      - run: nix develop .#rust --command bash -c "cargo nextest run --all"
      - run: nix develop .#rust --command bash -c "cargo test --doc --all-features -- --nocapture"

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: easimon/maximize-build-space@fc881a613ad2a34aca9c9624518214ebc21dfc0c # master 2025/3/10
        with:
          # The Android build (cargo-ndk + Gradle) runs in the workspace on the
          # root filesystem, so it needs plenty of free space there; keep a
          # large reserve. /nix still gets the rest of the (very large) disk
          # for the Nix closure and the NDK build dir.
          root-reserve-mb: 40960
          swap-size-mb: 1024
          temp-reserve-mb: 1024
          # Mount the maximized volume at /nix (not just /nix/store) so the Nix
          # build directory can live on the big mount too (see build-dir below).
          build-mount-path: "/nix"
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true
      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          # By default Nix builds in the daemon's TMPDIR on the small root
          # partition, so unpacking the Android NDK (~several GB) overflows
          # root-reserve-mb and fails with "write error (disk full?)". Point
          # build-dir at the large /nix mount instead.
          extra_nix_config: |
            build-dir = /nix/tmp

      - name: Create Nix build directory on the large mount
        run: sudo install -d -m 1777 /nix/tmp

      # Skip the binary cache (it writes to /tmp on the small root partition)
      # and install directly to /nix/store on the big mount instead.
      - run: nix profile install .#ci-android

      - uses: Swatinem/rust-cache@v2

      - name: Build takusu-android for aarch64
        run: |
          nix develop .#android --command bash -c "cargo ndk -t aarch64-linux-android build -p takusu-android --release --no-default-features"

  expo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit
