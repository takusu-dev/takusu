name: CI

on:
  push:
    branches:
      - '**'
      - '!regression-*-discover-*'
      - '!regression-*-fix-*'
  workflow_dispatch:

jobs:
  # Detect which areas of the repo changed so unrelated jobs can be skipped.
  # On workflow_dispatch every job runs (manual triggers ignore the filter).
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      mobile: ${{ steps.filter.outputs.mobile }}
      kotlin: ${{ steps.filter.outputs.kotlin }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'flake.nix'
              - 'flake.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yaml'
            mobile:
              - 'mobile/**'
              - '.github/workflows/ci.yaml'
            kotlin:
              - 'mobile/modules/**/*.kt'
              - 'mobile/.editorconfig'
              - '.github/workflows/ci.yaml'

  lint:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          extra_nix_config: |
            keep-outputs = true
            keep-env-derivations = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock', 'flake.nix', 'rust-toolchain.toml') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-last-accessed: P6D
          purge-primary-key: never

      - run: nix profile install .#ci-rust
      - run: nix build ".#devShells.${{ runner.arch == 'ARM64' && 'aarch64-linux' || 'x86_64-linux' }}.rust" -o /tmp/rust-shell

      - uses: Swatinem/rust-cache@v2

      - run: nix develop .#rust --command bash -c "cargo clippy --all-targets --all-features -- -D warnings"
  test:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          extra_nix_config: |
            keep-outputs = true
            keep-env-derivations = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock', 'flake.nix', 'rust-toolchain.toml') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-last-accessed: P6D
          purge-primary-key: never

      - run: nix profile install .#ci-rust
      - run: nix build ".#devShells.${{ runner.arch == 'ARM64' && 'aarch64-linux' || 'x86_64-linux' }}.rust" -o /tmp/rust-shell

      - uses: Swatinem/rust-cache@v2

      - run: nix develop .#rust --command bash -c "cargo nextest run --all"
      - run: nix develop .#rust --command bash -c "cargo test --doc --all-features -- --nocapture"

  android-build:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          # easimon/maximize-build-space is flaky on current GitHub-hosted
          # runners because the LVM setup can receive an invalid size and fail
          # with "fallocate: invalid length value specified". free-disk-space
          # only removes pre-installed software, which is enough now that
          # runners provide a single large root filesystem.
          tool-cache: true
      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          # Keep Nix build temporary files under /nix/tmp so they are colocated
          # with the Nix store instead of the daemon's default TMPDIR.
          extra_nix_config: |
            build-dir = /nix/tmp
            keep-outputs = true
            keep-env-derivations = true

      - name: Create Nix build directory
        run: sudo install -d -m 1777 /nix/tmp

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock', 'flake.nix', 'rust-toolchain.toml') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-last-accessed: P6D
          purge-primary-key: never

      - run: nix profile install .#ci-android
      - run: nix build ".#devShells.${{ runner.arch == 'ARM64' && 'aarch64-linux' || 'x86_64-linux' }}.android" -o /tmp/android-shell

      - uses: Swatinem/rust-cache@v2

      - name: Build takusu-android for aarch64
        run: |
          nix develop .#android --command bash -c "cargo ndk -t aarch64-linux-android build -p takusu-android --release --no-default-features"

  expo-check:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Oxlint
        working-directory: mobile
        run: npx oxlint

      - name: Oxfmt
        working-directory: mobile
        run: npx oxfmt --check

      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Test
        working-directory: mobile
        run: npm run test

  kotlin-check:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.kotlin == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          extra_nix_config: |
            keep-outputs = true
            keep-env-derivations = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock', 'flake.nix', 'rust-toolchain.toml') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 4G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-last-accessed: P6D
          purge-primary-key: never

      - run: nix profile install .#ci-kotlin

      - name: ktlint check
        working-directory: mobile
        run: ktlint 'modules/**/*.kt' '!modules/takusu-server/android/src/main/java/uniffi/**'

  kotlin-test:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.kotlin == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          # easimon/maximize-build-space is flaky on current GitHub-hosted
          # runners because the LVM setup can receive an invalid size and fail
          # with "fallocate: invalid length value specified". free-disk-space
          # only removes pre-installed software, which is enough now that
          # runners provide a single large root filesystem.
          tool-cache: true

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          extra_nix_config: |
            build-dir = /nix/tmp
            keep-outputs = true
            keep-env-derivations = true

      - name: Create Nix build directory
        run: sudo install -d -m 1777 /nix/tmp

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock', 'flake.nix', 'rust-toolchain.toml') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-last-accessed: P6D
          purge-primary-key: never

      - run: nix profile install .#test-android-unit

      - name: Install Expo dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Run Android unit tests
        run: test-android-unit
