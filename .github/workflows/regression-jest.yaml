name: Jest Regression CI

on:
  push:
    branches:
      - 'regression-*'
      - '!regression-*-discover-*'
      - '!regression-*-fix-*'
  pull_request:
    branches:
      - 'regression-*'
  workflow_dispatch:

jobs:
  test:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'regression-') && contains(github.head_ref, '-discover-'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run differential regression tests
        run: python3 .github/scripts/run-regression-jest.py
