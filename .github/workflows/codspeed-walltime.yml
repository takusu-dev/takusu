name: CodSpeed Walltime

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  codspeed-walltime:
    name: Run walltime benchmarks
    runs-on: codspeed-macro
    permissions:
      actions: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        bench:
          - package: takusu-core
            name: plan
          - package: takusu-core
            name: realworld
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          extra_nix_config: |
            keep-outputs = true
            keep-env-derivations = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ matrix.bench.name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ matrix.bench.name }}-
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-last-accessed: P6D
          purge-primary-key: never

      - run: nix profile install .#ci-rust
      - run: nix build ".#devShells.${{ runner.arch == 'ARM64' && 'aarch64-linux' || 'x86_64-linux' }}.rust" -o /tmp/rust-shell

      - uses: Swatinem/rust-cache@v2

      - name: Build benchmark
        run: nix develop .#rust --command bash -c 'cargo codspeed build -m walltime -p ${{ matrix.bench.package }} --bench ${{ matrix.bench.name }}'

      - name: Run benchmark
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          run: nix develop .#rust --command bash -c 'cargo codspeed run -m walltime -p ${{ matrix.bench.package }} --bench ${{ matrix.bench.name }}'
