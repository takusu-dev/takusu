name: Rust Regression CI

on:
  push:
    branches:
      - 'regression-*'
      - '!regression-*-discover-*'
      - '!regression-*-fix-*'
  pull_request:
    branches:
      - 'regression-*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          extra_nix_config: |
            keep-outputs = true
            keep-env-derivations = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock', 'flake.nix', 'rust-toolchain.toml') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-last-accessed: P6D
          purge-primary-key: never

      - run: nix profile install .#ci-rust
      - run: nix build ".#devShells.${{ runner.arch == 'ARM64' && 'aarch64-linux' || 'x86_64-linux' }}.rust" -o /tmp/rust-shell

      - uses: Swatinem/rust-cache@v2

      - name: Run differential regression tests
        # For discover PRs: identify new tests and expect them all to fail.
        # For fix PRs: run tests in crates touched by the diff and expect pass.
        run: python3 .github/scripts/run-regression-tests.py
