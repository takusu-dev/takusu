name: CodSpeed

on:
  push:
    branches:
      - '**'
      - '!regression-*-discover-*'
      - '!regression-*-fix-*'
  workflow_dispatch:

jobs:
  # Detect which areas of the repo changed so unrelated jobs can be skipped.
  # On workflow_dispatch every job runs (manual triggers ignore the filter).
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'flake.nix'
              - 'flake.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/codspeed.yml'

  codspeed:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/push-') && needs.changes.outputs.rust == 'true')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        bench:
          - package: takusu-habit
            name: habit
          - package: takusu-ical
            name: parse
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f
        with:
          extra_nix_config: |
            keep-outputs = true
            keep-env-derivations = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ matrix.bench.name }}-${{ hashFiles('flake.lock', 'flake.nix', 'rust-toolchain.toml') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ matrix.bench.name }}-
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: |
            nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-last-accessed: P6D
          purge-primary-key: never

      - run: nix profile install .#ci-rust
      - run: nix build ".#devShells.${{ runner.arch == 'ARM64' && 'aarch64-linux' || 'x86_64-linux' }}.rust" -o /tmp/rust-shell

      - uses: Swatinem/rust-cache@v2

      - name: Build benchmark
        run: nix develop .#rust --command bash -c 'cargo codspeed build -p ${{ matrix.bench.package }} --bench ${{ matrix.bench.name }}'

      - name: Run benchmark
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: nix develop .#rust --command bash -c 'cargo codspeed run -p ${{ matrix.bench.package }} --bench ${{ matrix.bench.name }}'
