[book]
authors = ["satler"]
language = "ja"
src = "src"
title = "takusu ドキュメント"
description = "takusu — 自動スケジュール構築プランナーと LLM 音声アシスタントのエンドユーザー向けドキュメント"

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/takusu-dev/takusu"
edit-url-template = "https://github.com/takusu-dev/takusu/edit/main/docs/{path}"
site-url = "/takusu/"
additional-css = ["theme/custom.css"]

[output.html.fold]
enable = true
level = 1
